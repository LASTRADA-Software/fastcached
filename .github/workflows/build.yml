# SPDX-License-Identifier: Apache-2.0
name: Build

on:
  push:
    branches: [master, main, "fix-ci"]
  pull_request:
    branches: [master, main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CLANG_TOOLS_VERSION: "22"
  GCC_VERSION: "14"
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/CPM

jobs:
  check-clang-format:
    name: "Check C++ style"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: "Install clang-format"
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.CLANG_TOOLS_VERSION }}
          sudo apt-get install -y clang-format-${{ env.CLANG_TOOLS_VERSION }}
      - name: "Run clang-format"
        run: |
          git ls-files '*.h' '*.hpp' '*.cpp' \
            | xargs clang-format-${{ env.CLANG_TOOLS_VERSION }} --dry-run --Werror --style=file

  linux:
    name: "Linux-${{ matrix.preset }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [clang-release, gcc-release]
    steps:
      - uses: actions/checkout@v4

      - name: "Cache CPM packages"
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.preset }}-

      - name: "ccache"
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.preset }}
          max-size: 256M

      - name: "Install build tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libyaml-cpp-dev

      - name: "Install Clang ${{ env.CLANG_TOOLS_VERSION }}"
        if: startsWith(matrix.preset, 'clang')
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.CLANG_TOOLS_VERSION }}
          sudo apt-get install -y clang-${{ env.CLANG_TOOLS_VERSION }} libc++-${{ env.CLANG_TOOLS_VERSION }}-dev libc++abi-${{ env.CLANG_TOOLS_VERSION }}-dev
          sudo ln -sf /usr/bin/clang-${{ env.CLANG_TOOLS_VERSION }} /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-${{ env.CLANG_TOOLS_VERSION }} /usr/local/bin/clang++

      - name: "Install GCC ${{ env.GCC_VERSION }}"
        if: startsWith(matrix.preset, 'gcc')
        run: |
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo ln -sf /usr/bin/gcc-${{ env.GCC_VERSION }} /usr/local/bin/gcc
          sudo ln -sf /usr/bin/g++-${{ env.GCC_VERSION }} /usr/local/bin/g++

      - name: "Configure"
        run: cmake --preset ${{ matrix.preset }}

      - name: "Build"
        run: cmake --build --preset ${{ matrix.preset }}

      - name: "Test"
        run: ctest --preset ${{ matrix.preset }}

      - name: "Upload Linux binary for the sccache smoke job"
        if: matrix.preset == 'clang-release'
        uses: actions/upload-artifact@v4
        with:
          name: fastcached-linux
          path: out/build/clang-release/target/fastcached
          retention-days: 1

  # clang-tidy runs in its own job (not folded into the release matrix above) so
  # it surfaces as a distinct PR status check. It reuses the clang-debug preset,
  # which is the only one wired with ENABLE_TIDY=ON (plus ASan/UBSan), so this job
  # also preserves the sanitizer-enabled Debug test pass that left the linux
  # matrix when that went release-only.
  clang-tidy:
    name: "clang-tidy"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: "Cache CPM packages"
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-clang-debug-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-clang-debug-

      - name: "ccache"
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-clang-debug
          max-size: 256M

      - name: "Install build tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libyaml-cpp-dev

      - name: "Install Clang ${{ env.CLANG_TOOLS_VERSION }}"
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.CLANG_TOOLS_VERSION }}
          sudo apt-get install -y clang-${{ env.CLANG_TOOLS_VERSION }} clang-tidy-${{ env.CLANG_TOOLS_VERSION }} libc++-${{ env.CLANG_TOOLS_VERSION }}-dev libc++abi-${{ env.CLANG_TOOLS_VERSION }}-dev
          sudo ln -sf /usr/bin/clang-${{ env.CLANG_TOOLS_VERSION }} /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-${{ env.CLANG_TOOLS_VERSION }} /usr/local/bin/clang++
          sudo ln -sf /usr/bin/clang-tidy-${{ env.CLANG_TOOLS_VERSION }} /usr/local/bin/clang-tidy

      - name: "Configure"
        run: cmake --preset clang-debug

      - name: "Build (runs clang-tidy via CMAKE_CXX_CLANG_TIDY)"
        run: cmake --build --preset clang-debug

      - name: "Test"
        run: ctest --preset clang-debug

  macos:
    name: "macOS-clang-release"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: "Cache CPM packages"
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-clang-release-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-clang-release-

      - name: "ccache"
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-clang-release
          max-size: 256M

      # Apple's bundled AppleClang 15 ships a libc++ without std::jthread
      # (libc++ only implemented it in LLVM 18). Use Homebrew's LLVM, whose
      # modern libc++ has it. llvm is keg-only, so we point the compiler at its
      # explicit path and add its libc++ to the linker search + rpath.
      - name: "Install build tools"
        run: brew install ninja llvm

      # The clang-release preset pins CMAKE_C/CXX_COMPILER to bare clang/clang++
      # (= AppleClang on PATH); override on the command line, which takes
      # precedence over preset cache variables, to use Homebrew's LLVM instead.
      #
      # Homebrew's libc++.dylib has `@rpath/libc++abi.1.dylib` and
      # `@rpath/libunwind.1.dylib` as runtime deps; libunwind lives under
      # `lib/unwind/`, not `lib/c++/`. Without that second rpath, dyld
      # resolves libunwind from /usr/lib/system instead — the resulting
      # two-libunwind / two-libc++abi load corrupts exception unwinding
      # on macos-14 and Catch2 sees SIGABRT instead of the C++ throw.
      - name: "Configure"
        run: |
          cmake --preset clang-release \
            -DCMAKE_C_COMPILER=/opt/homebrew/opt/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ \
            -DCMAKE_EXE_LINKER_FLAGS="-L/opt/homebrew/opt/llvm/lib/c++ -L/opt/homebrew/opt/llvm/lib/unwind -L/opt/homebrew/opt/llvm/lib -lunwind -Wl,-rpath,/opt/homebrew/opt/llvm/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm/lib/unwind"

      - name: "Build"
        run: cmake --build --preset clang-release

      - name: "Test"
        run: ctest --preset clang-release

  # Smoke tests live in three sibling jobs so the PR status check tells you
  # *which* protocol broke without opening the log. They share the same
  # fastcached binary artifact and the same compile-twice / expect-cache-hit
  # assertion. The only deltas are which sccache version is installed (apt
  # = 0.7.7 = OpenDAL 0.44 = memcached TEXT wire; mozilla-actions's prebuilt
  # = >=0.8 = OpenDAL >=0.45 = memcached BINARY wire) and which SCCACHE_*
  # env var points sccache at fastcached.

  sccache-smoke-memcached-text:
    name: "sccache smoke (memcached text)"
    runs-on: ubuntu-24.04
    needs: linux
    steps:
      - uses: actions/checkout@v4
      - name: "Download fastcached binary"
        uses: actions/download-artifact@v4
        with:
          name: fastcached-linux
          path: bin
      - name: "Make fastcached executable"
        run: chmod +x bin/fastcached
      - name: "Install sccache + a C++ compiler"
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache g++-14
      - name: "Smoke"
        run: bash scripts/sccache-smoke.sh --fastcached ./bin/fastcached --protocol memcached --port 11611 --compiler g++-14

  sccache-smoke-memcached-binary:
    name: "sccache smoke (memcached binary)"
    runs-on: ubuntu-24.04
    needs: linux
    steps:
      - uses: actions/checkout@v4
      - name: "Download fastcached binary"
        uses: actions/download-artifact@v4
        with:
          name: fastcached-linux
          path: bin
      - name: "Make fastcached executable"
        run: chmod +x bin/fastcached
      - name: "Install C++ compiler + libyaml-cpp runtime"
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 libyaml-cpp0.8
      # mozilla-actions/sccache-action ships sccache >= 0.8, which uses
      # OpenDAL >= 0.45 and speaks the memcached BINARY protocol; the apt
      # sccache (0.7.7) on noble still speaks text.
      - name: "Install sccache (binary protocol via OpenDAL >= 0.45)"
        uses: mozilla-actions/sccache-action@v0.0.6
      - name: "Smoke"
        run: bash scripts/sccache-smoke.sh --fastcached ./bin/fastcached --protocol memcached --port 11611 --compiler g++-14

  sccache-smoke-redis:
    name: "sccache smoke (redis RESP2)"
    runs-on: ubuntu-24.04
    needs: linux
    steps:
      - uses: actions/checkout@v4
      - name: "Download fastcached binary"
        uses: actions/download-artifact@v4
        with:
          name: fastcached-linux
          path: bin
      - name: "Make fastcached executable"
        run: chmod +x bin/fastcached
      - name: "Install sccache + a C++ compiler"
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache g++-14
      - name: "Smoke"
        run: bash scripts/sccache-smoke.sh --fastcached ./bin/fastcached --protocol redis --port 11611 --compiler g++-14

  windows:
    name: "Windows-${{ matrix.preset }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        preset: [cl-release, clangcl-release]
    steps:
      - uses: actions/checkout@v4

      - name: "Cache CPM packages"
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ runner.os }}-${{ matrix.preset }}-

      - name: "sccache"
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: "Install ninja"
        run: choco install ninja --no-progress

      - name: "Setup MSVC dev environment"
        uses: ilammy/msvc-dev-cmd@v1

      - name: "Configure"
        run: cmake --preset ${{ matrix.preset }}

      - name: "Build"
        run: cmake --build --preset ${{ matrix.preset }}

      - name: "Test"
        run: ctest --preset ${{ matrix.preset }}

      - name: "Upload fastcached.exe"
        uses: actions/upload-artifact@v4
        with:
          name: fastcached-windows-${{ matrix.preset }}
          path: out/build/${{ matrix.preset }}/target/fastcached.exe
          if-no-files-found: error
